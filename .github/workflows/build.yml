name: Docker image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read VSCode tag
        run: |
          if [ ! -f VSCODE_TAG ]; then
            echo "VSCODE_TAG file missing"
            exit 1
          fi
          TAG=$(cat VSCODE_TAG | tr -d '\n')
          if [ -z "$TAG" ]; then
            echo "VSCODE_TAG is empty"
            exit 1
          fi
          case "$TAG" in
            *[[:space:]/]*)
              echo "VSCODE_TAG must not contain spaces or '/'"
              exit 1
              ;;
            v[0-9]*.[0-9]*.[0-9]*|[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "VSCODE_TAG must be a VS Code tag like 1.109.5 or v1.109.5"
              exit 1
              ;;
          esac
          echo "VSCODE_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: VSCODE_TAG=${{ env.VSCODE_TAG }}
          tags: kotborealis/code-server-oss:pr-${{ github.event.pull_request.number }}

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read VSCode tag
        run: |
          if [ ! -f VSCODE_TAG ]; then
            echo "VSCODE_TAG file missing"
            exit 1
          fi
          TAG=$(cat VSCODE_TAG | tr -d '\n')
          if [ -z "$TAG" ]; then
            echo "VSCODE_TAG is empty"
            exit 1
          fi
          case "$TAG" in
            *[[:space:]/]*)
              echo "VSCODE_TAG must not contain spaces or '/'"
              exit 1
              ;;
            v[0-9]*.[0-9]*.[0-9]*|[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "VSCODE_TAG must be a VS Code tag like 1.109.5 or v1.109.5"
              exit 1
              ;;
          esac
          echo "VSCODE_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: VSCODE_TAG=${{ env.VSCODE_TAG }}
          tags: |
            kotborealis/code-server-oss:${{ env.VSCODE_TAG }}
            kotborealis/code-server-oss:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-${{ env.VSCODE_TAG }}
          name: VS Code ${{ env.VSCODE_TAG }}
          body: |
            Built from VS Code tag: ${{ env.VSCODE_TAG }}
            Docker image: kotborealis/code-server-oss:${{ env.VSCODE_TAG }}
